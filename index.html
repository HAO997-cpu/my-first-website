<!DOCTYPE html>
<!-- 声明这是一个网页文件 -->
<html lang="zh-CN">
<head>
    <!-- 网页的基础设置 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 网页标题：显示在浏览器标签上的文字 -->
    <title>我的个人网站</title>
    <!-- 引入美化页面的样式文件 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 页面主体内容，所有你能看到的东西都在这里 -->
    <div class="container">
        <!-- 1. 大标题 -->
        <h1>你好，我是网站的主人</h1>
        <!-- 2. 副标题/自我介绍 -->
        <p class="intro">这是我用MacBook Air做的第一个网站，超有成就感！</p>
        <!-- 3. 图片区域 -->
        <div class="img-box">
            <!-- 这里可以换成你自己的图片，先放一张免费的示例图 -->
            <img src="https://picsum.photos/800/400" alt="我的配图">
        </div>
        <!-- 4. 内容板块 -->
        <div class="content">
            <h2>关于我</h2>
            <p>我是一个新手，正在学习做网站，接下来我要把这个网站改成AI工具聚合平台！</p>
        </div>
        <div class="content">
            <h2>我的爱好</h2>
            <p>学习新东西、折腾AI、探索各种好玩的技术</p>
        </div>
        <!-- 5. 底部联系方式 -->
        <div class="footer">
            <p>联系我：xxx@qq.com | 我的小红书：xxx</p>
        </div>
    </div>
</body>
</html>
